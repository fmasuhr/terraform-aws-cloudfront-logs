name: Terraform

on: push

jobs:
  validate:
    runs-on: ubuntu-24.04

    steps:

    - uses: actions/checkout@v7
    - uses: hashicorp/setup-terraform@v4.0.1

    - uses: terraform-linters/setup-tflint@v6
      with:
        cache: true

    - name: Run tflint
      run: make tflint
    - name: Run terraform validate
      run: make validate
      env:
        AWS_REGION: us-east-1
